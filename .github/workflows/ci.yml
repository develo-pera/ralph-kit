name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck (backend)
        run: npm run typecheck

      - name: Typecheck (web)
        run: npx tsc -p web/tsconfig.json --noEmit

      - name: Unit tests with coverage
        run: npm run test:coverage -- --reporter=json --outputFile=test-results.json

      - name: Coverage summary on PR
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      - name: Extract test and coverage metrics
        id: metrics
        run: |
          COV=$(node -e "const c = require('./coverage/coverage-summary.json'); console.log(c.total.statements.pct)")
          TESTS=$(node -e "const r = require('./test-results.json'); const passed = r.numPassedTests; const failed = r.numFailedTests; console.log(passed + ',' + failed)")
          PASSED=$(echo "$TESTS" | cut -d, -f1)
          FAILED=$(echo "$TESTS" | cut -d, -f2)
          echo "coverage=$COV" >> "$GITHUB_OUTPUT"
          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "Coverage: $COV% | Tests: $PASSED passed, $FAILED failed"

      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: ralph-kit-coverage.json
          label: coverage
          message: ${{ steps.metrics.outputs.coverage }}%
          valColorRange: ${{ steps.metrics.outputs.coverage }}
          minColorRange: 40
          maxColorRange: 90

      - name: Update tests badge
        if: github.ref == 'refs/heads/main'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: ralph-kit-tests.json
          label: tests
          message: ${{ steps.metrics.outputs.passed }} passing
          color: ${{ steps.metrics.outputs.failed == '0' && 'brightgreen' || 'red' }}

      - name: Build
        run: npm run build
